name: Data Pipeline CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: |
          pip install uv

      - name: Install dependencies
        run: |
          uv sync

      - name: Create mock bronze data
        run: |
          mkdir -p data/bronze/2026/01/01
          cat <<EOF > data/bronze/2026/01/01/jobs.json
          [
            {
              "slug": "test-job",
              "company_name": "Test Company",
              "title": "Data Engineer",
              "description": "Test description",
              "remote": true,
              "url": "https://example.com",
              "tags": ["Python", "SQL"],
              "job_types": ["Full-time"],
              "location": "Remote",
              "created_at": 1772449289
            }
          ]
          EOF

      - name: Run transformation layer
        run: |
          uv run python -c "from transformation import transform_jobs; transform_jobs()"

      - name: Run gold layer
        run: |
          uv run python -c "from analytics import gold_jobs; generate_gold()"